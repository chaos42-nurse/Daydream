<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opening YouTube…</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #121212;
      color: #ffffff;
      text-align: center;
      padding: 24px;
    }

    main {
      max-width: 560px;
      line-height: 1.6;
    }

    a {
      color: #ff0000;
      text-decoration: none;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    /* cursore lampeggiante */
    #random-text::after {
      content: "|";
      animation: blink 1s infinite;
      margin-left: 4px;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>

<body>
  <main>
    <h1>Opening YouTube…</h1>
    <p id="random-text"></p>

    <div class="actions">
      <a id="open-app">Apri nell’app YouTube</a>
      <a id="open-web">Apri nel browser</a>
    </div>
  </main>

  <script>
    // 🔹 VIDEO
    const videoId = "5ixHZzc3164";

    const appUrl = "youtube://watch?v=" + videoId;
    const webUrl = "youtube://watch?v=5ixHZzc3164" + videoId;

    // 🔹 FRASI
    const frasi = [
      "Ti voglio bene",
      "Ricordati che sei capace e che meriti tanto",
      "Non smettere mai di splendere",
          ];

    // 🔹 PRENDI FRASE RANDOM
    const frase = frasi[Math.floor(Math.random() * frasi.length)];
    const target = document.getElementById("random-text");

    // 🔹 EFFETTO TYPING
    let i = 0;
    function typingEffect() {
      if (i < frase.length) {
        target.textContent += frase.charAt(i);
        i++;
        setTimeout(typingEffect, 35); // velocità scrittura
      }
    }

    typingEffect();

    // 🔹 LINK BOTTONI
    document.getElementById("open-app").href = appUrl;
    document.getElementById("open-web").href = webUrl;

    // 🔹 AUTO-APERTURA
    if (!window.__ytLaunchAttempted) {
      window.__ytLaunchAttempted = true;

      setTimeout(() => {
        window.location.replace(appUrl);

        // fallback
        setTimeout(() => {
          window.location.replace(webUrl);
        }, 1500);

      }, 2000); // aspetta mentre scrive
    }
  </script>
</body>
</html>
