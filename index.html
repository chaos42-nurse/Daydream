 <!DOCTYPE html>
<html>
<head>
  <title>Apri canzone</title>
  <script>
    function openMusic() {
      const spotifyApp = "spotify:track:4spyMABCbID9Tem2ukcbnz";
      const youtube = "https://www.youtube.com/watch?v=5ixHZzc3164";

      let timeout;

      // Se Spotify si apre davvero → stoppa il fallback
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          clearTimeout(timeout);
        }
      });

      // Prova ad aprire Spotify
      window.location.href = spotifyApp;

      // Se non funziona → YouTube
      timeout = setTimeout(() => {
        window.location.href = youtube;
      }, 1500);
    }
  </script>
</head>

<body onload="openMusic()">
  <p>Reindirizzamento in corso...</p>

  <!-- fallback manuale -->
  <p>Se non succede nulla:</p>
  <a href="spotify:track:4spyMABCbID9Tem2ukcbnz">Apri Spotify</a><br>
  <a href="https://www.youtube.com/watch?v=5ixHZzc3164">Apri YouTube</a>
</body>
</html>
